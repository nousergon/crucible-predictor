flow_name: predictor-inference
repo: nousergon/crucible-predictor
owner: "@brianmcmahon"
notify:
  - type: email
    sender: ${EMAIL_SENDER}
    recipients: ${EMAIL_RECIPIENTS}
    smtp_host: smtp.gmail.com
    smtp_port: 587
    smtp_password: ${GMAIL_APP_PASSWORD}
  - type: s3
    bucket: alpha-engine-research
    subsystem: predictor
  # Telegram forum-topic routing (config#1741 / config#645). Producer subset —
  # CRITICAL + OPS_HEALTH forum topics, mirroring crucible-research /
  # crucible-backtester flow-doctor.yaml. Canonical topic specs live in
  # nousergon_lib.flow_doctor_fleet (_FLEET_TELEGRAM_TOPIC_SPECS). Thread IDs
  # resolve from env (seeded from SSM /alpha-engine/ in prod).
  - type: telegram
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    message_thread_id: ${FLOW_DOCTOR_TELEGRAM_THREAD_CRITICAL}
    parse_mode: Markdown
    disable_notification: false
    notify_on: [critical]
  - type: telegram
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    message_thread_id: ${FLOW_DOCTOR_TELEGRAM_THREAD_OPS_HEALTH}
    parse_mode: Markdown
    disable_notification: false
    notify_on: [error, warning]
    notify_on_category: [TRANSIENT, EXTERNAL, INFRA]
store:
  # DynamoDB, not ephemeral /tmp SQLite. Each Lambda cold-start/EC2 spot
  # run is a fresh process, so a /tmp-backed store never sees the prior
  # invocation's dedup rows — dedup_cooldown_minutes is silently a no-op
  # and every recurring failure re-alerts from scratch (this exact class
  # of bug already caused an alert storm elsewhere in the fleet; see
  # alpha-engine-config#2418, prior fix in nousergon-data). DynamoDB is
  # shared/durable across processes and instances, so cooldown state
  # actually persists. Table provisioned out-of-band; runtime role only
  # needs CRUD (Put/Get/Query/Scan/DescribeTable), not CreateTable — see
  # infrastructure/iam/alpha-engine-predictor-role.json.
  type: dynamodb
  table_name: flow-doctor-store
  region: us-east-1
dedup_cooldown_minutes: 60
dependencies:
  - research-lambda
rate_limits:
  max_alerts_per_day: 10
