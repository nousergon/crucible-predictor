# ─────────────────────────────────────────────────────────────────────────────
# DESCRIPTIVE / DOCUMENTATION ONLY
#
# Production reads the live config from alpha-engine-config/predictor/predictor.yaml
# at runtime (bundled into the Predictor Inference Lambda via deploy.sh,
# synced to the training spot instance via spot_train.sh). Edits to this
# .sample file affect ONLY:
#   1. New-environment bootstrap (copies this template to predictor.yaml), and
#   2. Public-repo schema documentation for the predictor's config surface.
#
# Edits here have ZERO effect on the live system. To change a runtime value
# or hyperparameter, the change MUST land in alpha-engine-config (separate
# private repo). The backtester also auto-writes the veto threshold to S3 —
# see s3://alpha-engine-research/config/predictor_params.json.
# ─────────────────────────────────────────────────────────────────────────────

# Predictor configuration — model hyperparameters, production gates, and training params.
# Copy to predictor.yaml and customise all values below.
# These are intentionally naive defaults — tune them to your own data.

# ── Model architecture (NN — currently inactive, GBM is primary) ─────────────
model:
  hidden_1: 32                     # first hidden layer size
  hidden_2: 16                     # second hidden layer size
  dropout_1: 0.4                   # dropout rate after first layer
  dropout_2: 0.3                   # dropout rate after second layer

# ── Training hyperparameters (NN) ─────────────────────────────────────────────
training:
  batch_size: 256                  # training batch size
  learning_rate: 1.0e-3            # AdamW learning rate
  weight_decay: 1.0e-5             # L2 regularization
  max_epochs: 50                   # max training epochs
  early_stopping_patience: 10      # epochs to wait before early stopping
  scheduler_factor: 0.5            # ReduceLROnPlateau factor
  scheduler_patience: 5            # ReduceLROnPlateau patience
  min_lr: 1.0e-6                   # minimum learning rate
  grad_clip_norm: 1.0              # gradient clipping max norm
  # ROADMAP L1581 diagnostic — drop pre-cutoff rows from the meta-trainer's
  # data load. Null (default) keeps all available history. Set to e.g.
  # "2020-03-31" to replay the pre-ArcticDB-unification training-sample range
  # — the 2026-04-15 unification (predictor PR #27) extended the corpus back
  # to 2019-04 and meta IC dropped 0.052 → 0.033 in the same smoke test;
  # the hypothesis is that pre-2020 folds pull Ridge coefficients toward
  # less-predictive averages. Diagnostic-only — promote to a permanent
  # filter only after a Sat retrain confirms the recovery.
  train_start_date: null           # null = all history; "YYYY-MM-DD" to clamp

# ── Label thresholds ──────────────────────────────────────────────────────────
labeling:
  forward_days: 21                 # prediction horizon (trading days)
  up_threshold: 0.02               # predicted 21d sector-relative alpha > 2% → UP
  down_threshold: -0.02            # predicted 21d sector-relative alpha < -2% → DOWN (±2% = FLAT)
  label_clip: 0.25                 # clip extreme returns (±25%), null to disable
  adaptive_thresholds: false       # use rolling percentile thresholds instead of fixed
  adaptive_window: 63              # rolling window for adaptive percentiles (~3 months)
  adaptive_up_pct: 65              # percentile for UP threshold (top 35% → UP)
  adaptive_down_pct: 35            # percentile for DOWN threshold (bottom 35% → DOWN)

# ── Triple-barrier alpha labels (Stage 3, parallel-observe) ────────────────
# LdP Ch. 3.4 — path-dependent labels with per-row vol-scaled barriers
# (barrier = vol_multiplier × σ_t, where σ_t is EWMA std of sector-neutral
# residual log-returns). PR 1 ships the label generator only; PR 2 wires
# parallel L1 training; PR 5 flips `enforce_cutover` after ≥3 Sat-SF firings
# of the variant_cutover_gate show ≥15% relative IC lift.
triple_barrier:
  forward_window: 21               # time-out barrier in trading days
  vol_window: 20                   # EWMA span for σ_t (~1 trading month)
  vol_multiplier: 2.0              # barrier width as multiple of σ_t (LdP-standard ≈ 2-sigma)
  min_periods: 10                  # min EWMA observations before σ_t is non-NaN
  enforce_cutover: false           # PR 5 flips this to swap canonical L1 alpha target

# ── GBM hyperparameters ──────────────────────────────────────────────────────
# Values below are LightGBM library defaults (publicly documented — see
# https://lightgbm.readthedocs.io/), NOT production-tuned values. Real
# tuned values live in the private alpha-engine-config/predictor/predictor.yaml
# and take precedence via the config search path. Tune against your own data
# if standing up a new deployment.
gbm:
  n_estimators: 100                # LightGBM default
  early_stopping_rounds: 20
  ic_ir_gate: 0.20                 # IC IR threshold for model promotion
  tuned_params:
    objective: regression
    metric: mse
    num_leaves: 31                 # LightGBM default
    min_child_samples: 20          # LightGBM default
    max_depth: -1                  # LightGBM default (no limit)
    learning_rate: 0.1             # LightGBM default
    feature_fraction: 1.0          # LightGBM default
    bagging_fraction: 1.0          # LightGBM default
    lambda_l1: 0.0                 # LightGBM default
    lambda_l2: 0.0                 # LightGBM default
    num_threads: 4
    verbosity: -1
    seed: 42

  # Momentum base override (required) — fields here take precedence over the
  # shared tuned_params above for the momentum base only. Volatility base
  # keeps the shared params. Values below are LightGBM library defaults
  # (publicly documented, not our tuning) to keep the sample runnable and
  # CI green; real tuned values live in the private
  # alpha-engine-config/predictor/predictor.yaml. Missing section hard-fails
  # at config load — do not silently fall back to shared params.
  momentum:
    n_estimators: 100              # LightGBM default
    early_stopping_rounds: 20
    tuned_params:
      num_leaves: 31               # LightGBM default
      max_depth: -1                # LightGBM default (no limit)
      min_child_samples: 20        # LightGBM default
      learning_rate: 0.1           # LightGBM default
      feature_fraction: 1.0        # LightGBM default
      bagging_fraction: 1.0        # LightGBM default
      lambda_l1: 0.0               # LightGBM default
      lambda_l2: 0.0               # LightGBM default

# CatBoost ensemble retired 2026-04-27 alongside the v2 inference path.
# Its only consumer was the deleted ``_load_gbm`` CatBoost optional block;
# the v3 meta-model uses LightGBM Layer-1 heads + a ridge stacker.

# ── Production gates ──────────────────────────────────────────────────────────
gates:
  min_hit_rate: 0.52               # min directional accuracy to deploy
  min_ic: 0.02                     # min Pearson IC to promote model
  # min confidence for veto gate. Confidence semantics post-2026-05-12:
  # |p_up - 0.5| * 2 ∈ [0, 1] (ROADMAP L1615). Prior 0.60 winner-probability
  # gate maps to 0.20 under the new convention via new = (old - 0.5) * 2.
  min_confidence: 0.20

# ── Training split ────────────────────────────────────────────────────────────
split:
  train_frac: 0.70                 # fraction of data for training
  val_frac: 0.15                   # fraction for validation (rest = test)

# ── Data fetching ─────────────────────────────────────────────────────────────
data:
  refresh_batch_size: 50           # yfinance batch size for downloads
  bootstrap_period: "10y"          # historical period for price cache
  inference_period: "2y"           # price lookback for daily inference
  daily_closes_period: "5d"        # period for daily closes fetch
  staleness_threshold_days: 2      # business days before refresh
  slim_cache_lookback_days: 730    # calendar days for slim cache (2y)
  inference_batch_size: 100        # ticker batch size for inference
  min_rows_for_features: 265       # min rows for feature computation (252 warmup + buffer)
  split_return_threshold: 0.45     # ±45% return threshold for split detection

# ── Walk-forward validation ──────────────────────────────────────────────────
walk_forward:
  enabled: true
  test_window_trading_days: 126  # ~6 calendar months of trading days per fold
  min_train_days: 504            # ~2 years minimum training (trading days)
  purge_days: 21                 # matches forward_days (prevent label leakage)
  embargo_days: 0                # W1.1b (L4469) post-test embargo; 0=current (no-op in forward-WF), W1.4 raises to ~ceil(0.01*T) with the CPCV cutover
  min_folds_positive: 0.60       # 60% of folds must have IC > 0
  median_ic_gate: 0.01           # median IC across folds (lower bar — includes black swan periods)
  wf_n_estimators: 500           # faster GBM for fold validation (not production)
  wf_early_stopping: 20          # faster early stopping for fold validation

# ── Feature engineering parameters ────────────────────────────────────────────
features:
  rsi_period: 14                   # RSI lookback period
  macd_fast: 12                    # MACD fast EMA span
  macd_slow: 26                    # MACD slow EMA span
  macd_signal: 9                   # MACD signal line span
  macd_cross_window: 3             # days to look back for MACD cross
  ma_short: 50                     # short moving average window
  ma_long: 200                     # long moving average window
  momentum_short: 5                # short momentum window (days)
  momentum_long: 20                # long momentum window (days)
  weeks_52_days: 252               # trading days in 52 weeks
  vol_short_window: 10             # short volatility window
  vol_long_window: 60              # long volatility window
  bollinger_window: 20             # Bollinger Band SMA window
  bollinger_std: 2.0               # Bollinger Band standard deviations
  vix_baseline: 20.0               # VIX normalization baseline
  tnx_normalizer: 10.0             # TNX yield normalizer (10% → 1.0)
  ema_fast_span: 8                 # EMA cross fast span
  ema_slow_span: 21                # EMA cross slow span
  atr_period: 14                   # ATR lookback period
  realized_vol_window: 20          # realized volatility window
  volume_fast: 5                   # volume trend fast window
  volume_slow: 20                  # volume trend slow window
  obv_fast: 5                      # OBV fast rolling window
  obv_slow: 20                     # OBV slow rolling window
  rsi_slope_window: 5              # RSI slope lookback

# ── Alternative data features (O10-O12) ────────────────────────────────────
# These features are fetched from external APIs (FMP, yfinance) at inference
# time. For historical training, they default to neutral values.
# The GBM's regularization naturally downweights them if not predictive.
alternative_data:
  earnings_features_enabled: true    # O10: PEAD earnings surprise + recency
  revision_features_enabled: true    # O11: EPS revision momentum + streak
  options_features_enabled: true     # O12: put/call ratio, IV rank, IV vs RV

# ── Feature Store ────────────────────────────────────────────────────────────
# S3-based feature store. Writes dated Parquet snapshots after inference/training.
# Consumers (executor, research, backtester) read from s3://{bucket}/{prefix}{date}/.
feature_store:
  enabled: false                     # set true to activate feature store writes
  prefix: "features/"                # S3 key prefix for feature snapshots
  write_on_inference: true           # write daily feature snapshot after inference
  write_on_training: true            # upload registry.json after training
  full_universe: true                # compute technical features for all ~900 slim cache tickers

# Multi-horizon prediction retired 2026-04-27 alongside the v2 inference
# path. The v3 meta-model trains a single horizon (``forward_days`` above)
# and ranks via the ridge stacker; the auxiliary horizon loaders that
# consumed ``multi_horizon`` were deleted with ``_load_gbm``.

# ── Confidence calibration ───────────────────────────────────────────────────
# Replaces linear confidence mapping with calibrated probabilities.
# Fitted on pooled walk-forward OOS predictions during weekly training.
calibration:
  enabled: true                    # false → always use linear fallback
  method: "platt"                  # "platt" (logistic regression) or "isotonic"

# ── Feature selection / noise detection ──────────────────────────────────────
feature_selection:
  shap_noise_threshold_pct: 1.0    # SHAP below this % of top feature → noise candidate
  ic_noise_threshold: 0.005        # |feature IC| below this → noise candidate
  auto_prune: false                # true → automatically exclude noise features from production model
