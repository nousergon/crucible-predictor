name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up config
        run: cp config/predictor.sample.yaml config/predictor.yaml

      - name: Run tests
        run: pytest tests/ -v --ignore=tests/test_inference.py --ignore=tests/test_model.py

      - name: Security audit
        run: |
          pip install pip-audit
          IGNORE_ARGS=()
          if [ -f .github/pip-audit-ignore.txt ]; then
            while IFS= read -r vuln_id; do
              IGNORE_ARGS+=(--ignore-vuln "$vuln_id")
            done < <(grep -vE '^\s*#|^\s*$' .github/pip-audit-ignore.txt)
          fi
          pip-audit "${IGNORE_ARGS[@]}"

  # Alert (Telegram) ONLY on genuine post-merge breakage of the default
  # branch. PR-branch reds (mid-fix commits, cross-repo lib-tag merge-order
  # races) stay silent. Reusable workflow + transport in nousergon-lib.
  # See alpha-engine-config#1128.
  notify-main-failure:
    needs: [test]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit
